<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Chatbot - Login</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card" id="login-card">
            <h2>Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Login with Password</button>
            <button onclick="loginWithPasskey()" style="background: #34C759; margin-top: 10px;">Login with Passkey</button>
            <p class="error" id="login-error"></p>
            <p>Don't have an account? <a href="#" onclick="toggleMode('signup')">Sign Up</a></p>
        </div>

        <div class="card" id="signup-card" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="signup-username" placeholder="Username">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password (Optional for Passkey)">
            <button onclick="signup()">Sign Up with Password</button>
            <button onclick="signupWithPasskey()" style="background: #34C759; margin-top: 10px;">Sign Up with Passkey</button>
            <p class="error" id="signup-error"></p>
            <p>Already have an account? <a href="#" onclick="toggleMode('login')">Login</a></p>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'dashboard.html';
        }
        function toggleMode(mode) {
            if(mode === 'signup') {
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('signup-card').style.display = 'block';
            } else {
                document.getElementById('signup-card').style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
            }
        }
    </script>
</body>
</html>
