<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=0.3.7">
    <style>
        .memory-item { background: #f0f0f0; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .memory-actions button { margin-left: 5px; padding: 5px 10px; cursor: pointer; border: none; border-radius: 5px; }
        .memory-edit { background: #ffcc00; }
        .memory-del { background: #ff3b30; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Dashboard</h2>
            <button onclick="logout()" style="background: #ff3b30;">Logout</button>
        </div>
        
        <div class="card">
            <h3>Current Tier: <span id="user-tier"></span></h3>
        </div>

        <div class="card">
            <h3>Usage: Llama 7B + Qwen2 7B + Phi</h3>
            <p id="usage-7b">Loading...</p>
        </div>

        <div class="card">
            <h3>Usage: Llama 14B</h3>
            <p id="usage-14b">Loading...</p>
        </div>

        <div class="card">
            <h3>Global AI Memories</h3>
            <div id="memories-list">Loading memories...</div>
        </div>

        <button onclick="window.location.href='chat.html'" style="width: 100%; padding: 15px; font-size: 18px;">Start Chatting</button>
        <div style="text-align: center; margin-top: 20px; color: #888; font-size: 12px;">v0.5.0</div>
    </div>
    <script src="app.js?v=0.5.0"></script>
    <script>
        checkAuth();
        fetchUsage();
        loadMemories();
    </script>
</body>
</html>
